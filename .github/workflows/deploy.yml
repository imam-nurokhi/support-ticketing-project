name: Support CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD || secrets.SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || secrets.SSH_PORT || 22 }}
          script: |
            set -e
            REPO_NAME="${{ github.event.repository.name }}"
            REPO_DIR="${{ secrets.DEPLOY_PATH }}"

            if [ -z "$REPO_DIR" ]; then
              for candidate in "$HOME/$REPO_NAME" "/opt/$REPO_NAME" "/var/www/$REPO_NAME" "/srv/$REPO_NAME"; do
                if [ -d "$candidate/.git" ]; then
                  REPO_DIR="$candidate"
                  break
                fi
              done
            fi

            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$(find "$HOME" /opt /var/www /srv -maxdepth 4 -type d -name "$REPO_NAME" 2>/dev/null | while read -r dir; do
                if [ -d "$dir/.git" ] && [ -f "$dir/docker-compose.yml" ]; then
                  echo "$dir"
                  break
                fi
              done)"
            fi

            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$(find "$HOME" /opt /var/www /srv -maxdepth 5 \( -name docker-compose.yml -o -name compose.yml \) 2>/dev/null | while read -r compose_file; do
                if grep -q 'support.nexoratech.co' "$compose_file"; then
                  dirname "$compose_file"
                  break
                fi
              done)"
            fi

            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$HOME/$REPO_NAME"
              if [ ! -d "$REPO_DIR/.git" ]; then
                git clone "https://github.com/${{ github.repository }}.git" "$REPO_DIR"
              fi
            fi

            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main
            git clean -fd
            docker compose up -d --build
