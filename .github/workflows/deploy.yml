name: 🚀 Deploy Support App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 300s
          script: |
            set -e

            echo "📁 Setting up deployment directory..."
            mkdir -p ~/nexora-node/apps/support
            cd ~/nexora-node/apps/support

            # Clone or pull
            if [ -d ".git" ]; then
              echo "🔄 Pulling latest changes..."
              git fetch origin main
              git reset --hard origin/main
            else
              echo "📥 Cloning repository..."
              git clone https://github.com/imam-nurokhi/support-ticketing-project.git .
            fi

            echo "🐳 Building Docker image..."
            docker compose build --no-cache

            echo "🚀 Starting support container..."
            docker compose up -d --no-deps support

            echo "🔎 Checking support container..."
            docker compose ps support
            docker logs --tail=120 support
            docker exec support wget -qO- http://127.0.0.1:3000/ >/dev/null

            echo "✅ Deployment complete!"
            docker ps | grep support
